<!DOCTYPE html>
<html>
  <head>
    <title>Likert Average Score</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <h1>Likert Average Calculator</h1>
    <div class="input-container">
      <div class="input-row">
        <label>Strongly Agree:</label>
        <input inputmode="numeric" type="number" min="0" id="sagree" value="0">
      </div>
      <div class="input-row">
        <label>Agree:</label>
        <input inputmode="numeric" type="number" min="0" id="agree" value="0">
      </div>
      <div class="input-row">
        <label>Neutral:</label>
        <input inputmode="numeric" type="number" min="0" id="neutral" value="0">
      </div>
      <div class="input-row">
        <label>Disagree:</label>
        <input inputmode="numeric" type="number" min="0" id="disagree" value="0">
      </div>
      <div class="input-row">
        <label>Strongly Disagree:</label>
        <input inputmode="numeric" type="number" min="0" id="sdisagree" value="0">
      </div>
      <div>
        <label>Average Score: </label>
        <output id="average" for="sagree,agree,neutral,disagree,sdisagree"></output><br>
      </div>
      <div>
        <button onclick="executeAverage()">Calculate</button>
        <button onclick="clearInputs()">Clear</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
